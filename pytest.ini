[pytest]
testpaths = tests
python_files = test_*.py e2e_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    e2e: marks tests as end-to-end (requires LLM API + network; deselect with -m "not e2e")

# ── Logging ──────────────────────────────────────────────────────────────────
# All test log output (including from skill modules) goes to logs/tests/pytest.log
# The conftest.py also calls setup_test_logging() for the richer corr/req format.
log_cli = false
log_file = logs/tests/pytest.log
log_file_level = DEBUG
log_file_format = [%(asctime)s.%(msecs)03d] %(levelname)-5s | %(name)-30s | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
